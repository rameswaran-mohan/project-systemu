name: Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.  Please fill in
        as much as you can — the more we know, the faster we can fix it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of what's wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to trigger the bug.  Include the exact CLI
        commands, UI clicks, or API calls.
      placeholder: |
        1. Run `./install.sh --mode local`
        2. Open http://localhost:8765/scrolls
        3. Click "Approve" on any scroll
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include any error messages, stack traces, or log lines.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Deployment mode
      options:
        - local
        - docker-local
        - docker-enterprise
        - "Not applicable / multiple"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
      placeholder: "v0.2.0 or commit abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 24H2 / macOS 14.5 / Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "Python 3.12.2"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste log excerpts from `logs/daemon.log`, `logs/worker.log`,
        or `docker compose logs`.  Redact any secrets first.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I'm running the latest release (or `main`)
          required: false
        - label: I redacted any secrets / API keys from the logs
          required: true
